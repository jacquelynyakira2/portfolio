<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="aimBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FBBF24"/>
      <stop offset="100%" style="stop-color:#F59E0B"/>
    </linearGradient>
    <linearGradient id="aimShadow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D97706;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#B45309;stop-opacity:0.3"/>
    </linearGradient>
  </defs>
  
  <!-- Background rounded square (macOS style) -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#aimBg)"/>
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#aimShadow)"/>
  
  <!-- Running man silhouette (AIM iconic figure) -->
  <g transform="translate(256, 256) scale(0.7) translate(-256, -256)">
    <!-- Head -->
    <circle cx="280" cy="120" r="50" fill="white"/>
    
    <!-- Body -->
    <path d="M240 180 L260 300 L180 300 L160 380 L120 370 L155 280 L140 280 L200 170 Z" fill="white"/>
    
    <!-- Back arm -->
    <path d="M200 200 L120 160 L100 190 L180 240 Z" fill="white"/>
    
    <!-- Front arm -->
    <path d="M260 200 L340 140 L370 170 L290 250 Z" fill="white"/>
    
    <!-- Back leg -->
    <path d="M180 300 L100 400 L130 420 L200 330 Z" fill="white"/>
    
    <!-- Front leg -->
    <path d="M260 300 L380 380 L370 420 L240 340 Z" fill="white"/>
  </g>
  
  <!-- AIM text -->
  <text x="256" y="450" font-family="Arial, sans-serif" font-size="80" font-weight="bold" fill="white" text-anchor="middle" opacity="0.9">AIM</text>
</svg>
